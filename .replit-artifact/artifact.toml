kind = "api"
previewPath = "/"
title = "Nisha Salon Bot"
version = "1.0.0"
id = "95a08eee8b524aa6b426"

[[services]]
localPort = 8000
name = "Nisha Salon Bot"
paths = ["/"]

[services.development]
run = "cd artifacts/nisha-salon-bot && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

[services.production]

[services.production.build]
args = ["pip", "install", "-r", "artifacts/nisha-salon-bot/requirements.txt"]

[services.production.run]
args = ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
workingDir = "artifacts/nisha-salon-bot"

[services.production.run.env]
PORT = "8000"

[services.production.health.startup]
path = "/health"
